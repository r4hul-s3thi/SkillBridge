services:
  - type: web
    name: skillswap-backend
    runtime: node
    rootDir: Skill bridge/skillswap-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production
